name: Build

on:
  push:
    paths-ignore:
      - '*.md'
      - '.gitignore'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
        config:
          - { name: Linux, os: ubuntu-latest }
          - { name: Windows, os: windows-latest }
          - { name: macOS, os: macos-latest }

    name: Desktop / ${{ matrix.config.name }} (${{ matrix.build_type }})
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja (Linux)
        if: matrix.config.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install Ninja (macOS)
        if: matrix.config.os == 'macos-latest'
        run: brew install ninja

      - name: Install Ninja (Windows)
        if: matrix.config.os == 'windows-latest'
        run: choco upgrade ninja

      - name: Setup MSVC (Windows)
        if: matrix.config.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        shell: bash
        run: |
          cmake -S addons/FoundationGameplayTags -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FoundationGameplayTags-${{ matrix.config.name }}-${{ matrix.build_type }}
          path: addons/FoundationGameplayTags/bin/*
          if-no-files-found: error

  # ── iOS: cross-compile only (device/arm64, statically linked — Godot
  # requires GDExtensions to be statically linked on iOS). No on-runner
  # execution, no simulator slice, no export wiring yet. ────────────────
  ios:
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    name: iOS (${{ matrix.build_type }})
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (device, arm64)
        run: |
          cmake -S addons/FoundationGameplayTags -B build-ios -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY=""

      - name: Build
        run: cmake --build build-ios --config ${{ matrix.build_type }}

      - name: Stage artifact
        # Two real bugs, not one, both from the Xcode generator being multi-config:
        # (1) it nests product output under a per-config subdirectory (e.g. bin/Debug/),
        # which a glob upload preserves — the later flat "cp artifacts/*" packaging step
        # then fails on that directory ("cp: -r not specified; omitting directory").
        # (2) CMakeLists.txt computes the filename's debug/release segment from
        # CMAKE_BUILD_TYPE at CONFIGURE time, but Xcode (unlike Ninja) ignores that and
        # only actually picks a config at BUILD time via --config — so with no
        # -DCMAKE_BUILD_TYPE passed at configure, EVERY config here builds a file
        # literally misnamed ...release.arm64.a, including the Debug job. Confirmed by
        # downloading a real "Debug" CI artifact and finding a file named "release"
        # inside a "Debug/" subdirectory. Sidestepped entirely by finding whatever the
        # build actually produced and re-copying it flat under the name matrix.build_type
        # actually means, instead of trusting CMake's own (wrong, for this generator) name.
        shell: bash
        run: |
          mkdir -p staged
          type_lower=$(echo "${{ matrix.build_type }}" | tr '[:upper:]' '[:lower:]')
          find build-ios -name "libFoundationGameplayTags.ios.*.arm64.a" \
            -exec cp {} "staged/libFoundationGameplayTags.ios.${type_lower}.arm64.a" \;
          ls -la staged/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FoundationGameplayTags-iOS-${{ matrix.build_type }}
          path: staged/libFoundationGameplayTags.ios.*.arm64.a
          if-no-files-found: error

  # ── Android: cross-compile only via NDK. ───────────────────────────────
  android:
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]
        abi: [arm64-v8a, armeabi-v7a, x86_64]

    name: Android ${{ matrix.abi }} (${{ matrix.build_type }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Configure
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cmake -S addons/FoundationGameplayTags -B build-android-${{ matrix.abi }} -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build-android-${{ matrix.abi }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FoundationGameplayTags-Android-${{ matrix.abi }}-${{ matrix.build_type }}
          path: addons/FoundationGameplayTags/bin/*
          if-no-files-found: error

  package:
    name: Package addon
    needs: [desktop, ios, android]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: FoundationGameplayTags-*
          path: artifacts
          merge-multiple: true

      - name: Assemble addon package
        run: |
          mkdir -p package/addons/FoundationGameplayTags
          cp -r addons/FoundationGameplayTags/CSharp package/addons/FoundationGameplayTags/
          cp -r addons/FoundationGameplayTags/src package/addons/FoundationGameplayTags/
          cp -r addons/FoundationGameplayTags/editor package/addons/FoundationGameplayTags/
          cp -r addons/FoundationGameplayTags/gate package/addons/FoundationGameplayTags/
          cp addons/FoundationGameplayTags/plugin.cfg package/addons/FoundationGameplayTags/
          # Ships inert (.gdextension.available, not .gdextension) — Godot's boot-time
          # scan never auto-loads it; gate/heathen_gate.gd renames it to the real name
          # once GameplayTagsEditorPlugin.gd confirms Godot-Game-Framework is present.
          cp addons/FoundationGameplayTags/FoundationGameplayTags.gdextension.available package/addons/FoundationGameplayTags/
          cp addons/FoundationGameplayTags/heathen_manifest.json package/addons/FoundationGameplayTags/
          cp addons/FoundationGameplayTags/FoundationAutoload.gd package/addons/FoundationGameplayTags/
          cp addons/FoundationGameplayTags/FoundationAutoload.tscn package/addons/FoundationGameplayTags/
          cp addons/FoundationGameplayTags/GameplayTagsList.gd package/addons/FoundationGameplayTags/
          mkdir -p package/addons/FoundationGameplayTags/bin
          cp artifacts/* package/addons/FoundationGameplayTags/bin/
          cp README.md package/addons/FoundationGameplayTags/
          cp LICENSE package/addons/FoundationGameplayTags/
          cd package && zip -r ../FoundationGameplayTags.zip addons

      - name: Upload packaged addon
        uses: actions/upload-artifact@v4
        with:
          name: FoundationGameplayTags
          path: FoundationGameplayTags.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: FoundationGameplayTags.zip
